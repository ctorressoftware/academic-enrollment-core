# Application
server.port=${APP_PORT}

# Hibernate/JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Spring security
spring.security.user.name=${TEMPORAL_USER}
spring.security.user.password=${TEMPORAL_PASS}

# Connection pool
spring.datasource.hikari.pool-name=integration-pool
spring.datasource.hikari.maximum-pool-size=
spring.datasource.hikari.minimum-idle=
spring.datasource.hikari.connection-timeout=

# Error handling
spring.web.error.whitelabel.enabled=false
spring.web.error.include-stacktrace=never
spring.web.error.include-path=never

# Server hardening
server.server-header=
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
