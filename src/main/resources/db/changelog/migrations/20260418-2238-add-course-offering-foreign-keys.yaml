databaseChangeLog:
  - changeSet:
      id: 20260418-2238-add-academic-period-id-fk-to-course-offering-table
      author: Carlos Torres
      preConditions:
        - onFail: MARK_RAN
        - onFailMessage: "constraint academic_period_id_fk already exists"
        - onError: HALT
        - not:
            - foreignKeyConstraintExists:
                foreignKeyConstraintName: academic_period_id_fk
                foreignKeyTableName: course_offering
      changes:
        - addForeignKeyConstraint:
            constraintName: academic_period_id_fk
            baseTableName: course_offering
            baseColumnNames: academic_period_id
            referencedTableName: academic_period
            referencedColumnNames: id
            onUpdate: CASCADE
            onDelete: RESTRICT

