databaseChangeLog:
  - changeSet:
      id: 20260418-1231-seed-dni-document-type-catalog
      author: Carlos Torres
      preConditions:
        - onFail: MARK_RAN
        - onFailMessage: "dni type already exists"
        - onError: HALT
        - sqlCheck:
            expectedResult: 0
            sql: "SELECT COUNT(*) FROM document_type WHERE code = 'DNI'"
      changes:
        - insert:
            tableName: document_type
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: code, value: DNI }
              - column: { name: description, value: National Identity Document }
              - column: { name: active, valueBoolean: true }
              - column: { name: created_at, valueComputed: now() }
              - column: { name: updated_at, valueComputed: now() }

