databaseChangeLog:
  - changeSet:
      id: 20260412-2158-add-fk-student-document-type
      author: Carlos Torres
      preConditions:
      - onFail: MARK_RAN
      - onFailMessage: "student_document_type_id_fk already exists."
      - onError: HALT
      - not:
          - foreignKeyConstraintExists:
              foreignKeyConstraintName: student_document_type_id_fk
              baseTableName: student
      changes:
        - addForeignKeyConstraint:
            constraintName: student_document_type_id_fk
            baseTableName: student
            baseColumnNames: document_type_id
            referencedTableName: document_type
            referencedColumnNames: id
            onUpdate: CASCADE
            onDelete: RESTRICT