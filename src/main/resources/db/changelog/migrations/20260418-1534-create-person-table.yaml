databaseChangeLog:
  - changeSet:
      id: 20260418-1534-create-person-table
      author: Carlos Torres
      preConditions:
      - onFail: MARK_RAN
      - onFailMessage: "person table already exists."
      - onError: HALT
      - not:
          - tableExists:
                tableName: person
      changes:
        - createTable:
            tableName: person
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    primaryKeyName: person_id_pk
              - column:
                  name: first_name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    notNullConstraintName: person_first_name_nnull
              - column:
                  name: middle_name
                  type: varchar(100)
                  constraints:
                    nullable: true
              - column:
                  name: last_name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    notNullConstraintName: person_last_name_nnull
              - column:
                  name: second_last_name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    notNullConstraintName: person_second_last_name_nnull
              - column:
                  name: document_type_id
                  type: smallint
                  constraints:
                    nullable: false
                    notNullConstraintName: person_document_type_nnull
              - column:
                  name: document_number
                  type: varchar(15)
                  constraints:
                    nullable: false
                    notNullConstraintName: person_document_number_nnull
                    unique: true
                    uniqueConstraintName: person_document_number_unique
              - column:
                  name: gender_id
                  type: smallint
                  constraints:
                    nullable: false
                    notNullConstraintName: person_gender_id_nnull
              - column:
                  name: email
                  type: varchar(200)
                  constraints:
                    nullable: false
                    notNullConstraintName: person_email_nnull
                    unique: true
                    uniqueConstraintName: person_email_unique
              - column:
                  name: active
                  type: bool
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
                    notNullConstraintName: person_active_nnull
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                    notNullConstraintName: person_created_at_nnull
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
                    notNullConstraintName: person_updated_at_nnull