databaseChangeLog:
  - changeSet:
      id: 20260418-1229-create-document-type-table
      author: Carlos Torres
      preConditions:
        - onFail: MARK_RAN
        - onFailMessage: "document_type table already exists"
        - onError: HALT
        - not:
            - tableExists:
              tableName: document_type
      changes:
        - createTable:
            tableName: document_type
            columns:
              - column:
                  name: id
                  type: smallint
                  constraints:
                    primaryKey: true
                    primaryKeyName: document_type_id_pk
              - column:
                  name: code
                  type: varchar(20)
                  constraints:
                    nullable: false
                    notNullConstraintName: document_type_code_nnull
                    unique: true
                    uniqueConstraintName: document_type_code_unique
                    checkConstraint: "code IN ('DNI', 'PASSPORT', 'RNC')"
              - column:
                  name: description
                  type: varchar(100)
                  constraints:
                    nullable: false
                    notNullConstraintName: document_type_description_nnull
              - column:
                  name: active
                  type: bool
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
                    notNullConstraintName: document_type_active_nnull
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                    notNullConstraintName: document_type_created_at_nnull
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
                    notNullConstraintName: document_type_updated_at_nnull