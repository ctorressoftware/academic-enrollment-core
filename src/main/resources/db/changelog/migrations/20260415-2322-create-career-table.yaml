databaseChangeLog:
    - changeSet:
          id: 20260415-2322-create-career-table
          author: Carlos Torres
          preConditions:
              - onFail: MARK_RAN
              - onFailMessage: "career table already exists"
              - onError: HALT
              - not:
                    - tableExists:
                      tableName: career
          changes:
              - createTable:
                    tableName: career
                    columns:
                        - column:
                              name: id
                              type: smallint
                              constraints:
                                  primaryKey: true
                                  nullable: false
                        - column:
                              name: code
                              type: varchar(20)
                              constraints:
                                  nullable: false
                                  unique: true
                        - column:
                              name: description
                              type: varchar(100)
                              constraints:
                                  nullable: false
                        - column:
                              name: active
                              type: bool
                              defaultValueBoolean: true
                              constraints:
                                  nullable: false
                                  notNullConstraintName: student_active_nnull
                        - column:
                              name: created_at
                              type: timestamptz
                              constraints:
                                  nullable: false
                                  notNullConstraintName: student_created_at_nnull
                        - column:
                              name: updated_at
                              type: timestamptz
                              constraints:
                                  nullable: true