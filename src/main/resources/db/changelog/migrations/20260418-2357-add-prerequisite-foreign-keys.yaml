databaseChangeLog:
  - changeSet:
      id: 20260418-2357-add-subject-id-fk
      author: Carlos Torres
      preConditions:
        - onFail: MARK_RAN
        - onFailMessage: "constraint subject_id_fk already exists"
        - onError: HALT
        - not:
            - foreignKeyConstraintExists:
                foreignKeyConstraintName: subject_id_fk
                foreignKeyTableName: prerequisite
      changes:
        - addForeignKeyConstraint:
            constraintName: subject_id_fk
            baseTableName: prerequisite
            baseColumnNames: subject_id
            referencedTableName: subject
            referencedColumnNames: id
            onUpdate: CASCADE
            onDelete: RESTRICT

