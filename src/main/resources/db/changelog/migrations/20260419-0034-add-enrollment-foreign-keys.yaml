databaseChangeLog:
  - changeSet:
      id: 20260419-0034-add-enrollment-student-id-fk
      author: Carlos Torres
      preConditions:
        - onFail: MARK_RAN
        - onFailMessage: "constraint enrollment_student_id_fk already exists"
        - onError: HALT
        - not:
            - foreignKeyConstraintExists:
                foreignKeyConstraintName: enrollment-student_id_fk
                foreignKeyTableName: enrollment
      changes:
        - addForeignKeyConstraint:
            constraintName: enrollment-student_id_fk
            baseTableName: enrollment
            baseColumnNames: student_id
            referencedTableName: student
            referencedColumnNames: id
            onUpdate: CASCADE
            onDelete: RESTRICT

